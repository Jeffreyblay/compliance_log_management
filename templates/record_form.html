{% extends "base.html" %}
{% block title %}{{ action }} Record — ComplianceLog{% endblock %}
{% block page_title %}{{ action }} Record{% endblock %}
{% block content %}
<div style="max-width:680px">
  <form method="post">
    <div class="card" style="margin-bottom:16px">
      <div class="card-header"><div class="card-title">Product Details</div></div>
      <div class="form-row">
        <div class="form-group">
          <label>Input Date</label>
          <input type="text" name="input_date" value="{{ record.input_date if record else '' }}" placeholder="e.g. 01/01/2025"/>
        </div>
        <div class="form-group">
          <label>Product Number *</label>
          <input type="text" name="product_number" value="{{ record.product_number if record else '' }}" placeholder="Unique product number"/>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Version</label>
          <input type="text" name="version" value="{{ record.version if record else '' }}" placeholder="Reference within product number"/>
        </div>
        <div class="form-group">
          <label>Visibility</label>
          <input type="text" name="visibility" value="{{ record.visibility if record else '' }}" placeholder="e.g. active, archived"/>
        </div>
      </div>
      <div class="form-group">
        <label>Initials</label>
        <input type="text" name="initials" value="{{ record.initials if record else '' }}" placeholder="Worker responsible"/>
      </div>
    </div>

    <div class="card" style="margin-bottom:16px">
      <div class="card-header"><div class="card-title">Location</div></div>
      <div class="form-row">
        <div class="form-group">
          <label>Cabinet Label</label>
          <input type="text" name="cabinet_label" value="{{ record.cabinet_label if record else '' }}" placeholder="Physical cabinet location"/>
        </div>
        <div class="form-group">
          <label>Shelf Label</label>
          <input type="text" name="shelf_label" value="{{ record.shelf_label if record else '' }}" placeholder="Shelf within cabinet"/>
        </div>
      </div>
    </div>

    <div class="card" style="margin-bottom:16px">
      <div class="card-header"><div class="card-title">Expiry &amp; Notification</div></div>
      <div class="form-row">
        <div class="form-group">
          <label>Expiry Date</label>
          <input type="date" name="expiry_date" value="{{ record.expiry_date if record else '' }}"/>
        </div>
        <div class="form-group">
          <label>Notify X Days Before Expiry</label>
          <input type="number" name="notify_days_before" value="{{ record.notify_days_before if record else 30 }}" min="1" max="365"/>
        </div>
      </div>
    </div>

    {% if record %}
    <div class="card" style="margin-bottom:16px">
      <div class="card-header"><div class="card-title">Notes</div></div>
      <div class="form-group" style="margin-bottom:0">
        <textarea name="notes" placeholder="Any additional notes…">{{ record.notes or '' }}</textarea>
      </div>
    </div>
    {% endif %}

    <div style="display:flex;gap:10px">
      <button type="submit" class="btn btn-primary">{{ action }} Record</button>
      <a href="{{ url_for('records') }}" class="btn btn-secondary">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
